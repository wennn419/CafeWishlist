# docker-compose.yml
# Defines the three containers our class needs:
#   1. web        -> PHP 8.2 + Apache (serves our .php files)
#   2. db         -> MySQL 8.0 (stores our guestbook messages)
#   3. phpmyadmin -> a web UI to look inside the database
#
# Run everything with:   docker compose up
# Stop everything with:   Ctrl+C  then  docker compose down

services:
  web:
    image: php:8.2-apache
    container_name: guestbook-web
    ports:
      - "8080:80"            # visit http://localhost:8080 in your browser
    volumes:
      - ./src:/var/www/html  # your code on the left, lives inside container on the right
    depends_on:
      - db
    # Install the mysqli extension so PHP can talk to MySQL
    command: >
      bash -c "docker-php-ext-install mysqli && apache2-foreground"

  db:
    image: mysql:8.0
    container_name: guestbook-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: guestbook        # database is auto-created on first run
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql              # keeps data when containers restart
      - ./db:/docker-entrypoint-initdb.d    # .sql files here run automatically on first boot

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: guestbook-pma
    ports:
      - "8081:80"            # visit http://localhost:8081 to browse the database
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data:
